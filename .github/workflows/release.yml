name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: syntext-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: syntext-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: syntext-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --minify --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Compress binary
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.replace('v', '')

            // Get release assets for checksums
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'syntext-dev',
              repo: 'syntext',
              tag,
            })

            const checksumAsset = release.data.assets.find(a => a.name === 'checksums.txt')
            if (!checksumAsset) return

            const checksumContent = await github.request(checksumAsset.browser_download_url)
            const checksums = checksumContent.data.toString()

            const getSha = (name) => {
              const line = checksums.split('\n').find(l => l.includes(name))
              return line ? line.split(' ')[0] : ''
            }

            const formula = `class Syntext < Formula
              desc "AI-powered developer documentation CLI"
              homepage "https://syntext.dev"
              version "${version}"
              license "MIT"

              on_macos do
                if Hardware::CPU.arm?
                  url "https://github.com/syntext-dev/syntext/releases/download/${tag}/syntext-darwin-arm64.tar.gz"
                  sha256 "${getSha('darwin-arm64')}"
                else
                  url "https://github.com/syntext-dev/syntext/releases/download/${tag}/syntext-darwin-x64.tar.gz"
                  sha256 "${getSha('darwin-x64')}"
                end
              end

              on_linux do
                url "https://github.com/syntext-dev/syntext/releases/download/${tag}/syntext-linux-x64.tar.gz"
                sha256 "${getSha('linux-x64')}"
              end

              def install
                bin.install Dir["syntext-*"].first => "syntext"
              end

              test do
                assert_match "syntext", shell_output("#{bin}/syntext --version")
              end
            end
            `

            // Create or update the formula file in homebrew-tap repo
            await github.rest.repos.createOrUpdateFileContents({
              owner: 'syntext-dev',
              repo: 'homebrew-tap',
              path: 'Formula/syntext.rb',
              message: `Update syntext to ${version}`,
              content: Buffer.from(formula).toString('base64'),
              committer: { name: 'github-actions', email: 'actions@github.com' },
            })
