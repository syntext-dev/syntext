name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: bun-darwin-arm64
            artifact: stx-darwin-arm64
          - os: macos-13
            target: bun-darwin-x64
            artifact: stx-darwin-x64
          - os: ubuntu-latest
            target: bun-linux-x64
            artifact: stx-linux-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build src/index.ts --compile --minify --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - name: Compress binary
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const tag = context.ref.replace('refs/tags/', '')
            const version = tag.replace('v', '')

            // Get release assets for checksums
            const release = await github.rest.repos.getReleaseByTag({
              owner: 'syntext-dev',
              repo: 'syntext',
              tag,
            })

            const checksumAsset = release.data.assets.find(a => a.name === 'checksums.txt')
            if (!checksumAsset) return

            const checksumRes = await fetch(checksumAsset.browser_download_url)
            const checksums = await checksumRes.text()

            const getSha = (name) => {
              const line = checksums.split('\n').find(l => l.includes(name))
              return line ? line.split(/\s+/)[0] : ''
            }

            const formula = [
              'class Stx < Formula',
              '  desc "AI-powered developer documentation CLI"',
              '  homepage "https://syntext.dev"',
              `  version "${version}"`,
              '  license "MIT"',
              '',
              '  on_macos do',
              '    if Hardware::CPU.arm?',
              `      url "https://github.com/syntext-dev/syntext/releases/download/${tag}/stx-darwin-arm64.tar.gz"`,
              `      sha256 "${getSha('stx-darwin-arm64')}"`,
              '    else',
              `      url "https://github.com/syntext-dev/syntext/releases/download/${tag}/stx-darwin-x64.tar.gz"`,
              `      sha256 "${getSha('stx-darwin-x64')}"`,
              '    end',
              '  end',
              '',
              '  on_linux do',
              `    url "https://github.com/syntext-dev/syntext/releases/download/${tag}/stx-linux-x64.tar.gz"`,
              `    sha256 "${getSha('stx-linux-x64')}"`,
              '  end',
              '',
              '  def install',
              '    bin.install Dir["stx-*"].first => "stx"',
              '  end',
              '',
              '  test do',
              `    assert_match "${version}", shell_output("#{bin}/stx --version")`,
              '  end',
              'end',
            ].join('\n') + '\n'

            // Get existing file SHA
            let sha
            try {
              const existing = await github.rest.repos.getContent({
                owner: 'syntext-dev',
                repo: 'homebrew-tap',
                path: 'Formula/stx.rb',
              })
              sha = existing.data.sha
            } catch {}

            await github.rest.repos.createOrUpdateFileContents({
              owner: 'syntext-dev',
              repo: 'homebrew-tap',
              path: 'Formula/stx.rb',
              message: `Update stx to ${version}`,
              content: Buffer.from(formula).toString('base64'),
              sha,
              committer: { name: 'github-actions', email: 'actions@github.com' },
            })

